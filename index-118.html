<!DOCTYPE html>
<html lang="am" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ባጃጅ ትራከር</title>
  <meta name="theme-color" content="#f5a623"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ባጃጅ"/>
  <link rel="manifest" id="pwa-manifest"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;600;700;900&display=swap');
    :root{
      --orange:#f5a623;--orange-deep:#d4881a;--orange-light:#fff3dc;
      --black:#1a1208;--gray:#6b5c3e;--gray-light:#f5f0e8;
      --white:#fffdf8;--red:#c0392b;--green:#2e7d4f;
      --shadow:0 4px 20px rgba(245,166,35,0.15);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans Ethiopic',sans-serif;background:var(--white);color:var(--black);min-height:100vh;max-width:480px;margin:0 auto;}

    /* ---- LOGIN ---- */
    #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:var(--black);}
    .login-logo{font-size:4rem;margin-bottom:8px;}
    .login-title{font-size:1.6rem;font-weight:900;color:var(--orange);margin-bottom:4px;}
    .login-sub{font-size:0.8rem;color:var(--orange-deep);margin-bottom:32px;}
    .login-card{background:#2a1e0e;border:1.5px solid #3a2a10;border-radius:16px;padding:24px;width:100%;max-width:360px;}
    .login-label{display:block;font-size:0.8rem;font-weight:700;color:var(--orange-deep);margin-bottom:6px;}
    .login-input{width:100%;padding:13px 16px;border:1.5px solid #4a3520;border-radius:10px;font-family:inherit;font-size:1rem;background:#1a1208;color:var(--white);margin-bottom:16px;letter-spacing:1px;}
    .login-input:focus{outline:none;border-color:var(--orange);}
    .login-btn{width:100%;padding:14px;background:var(--orange);border:none;border-radius:10px;font-family:inherit;font-size:1rem;font-weight:900;cursor:pointer;color:var(--black);margin-top:4px;}
    .login-btn:active{background:var(--orange-deep);}
    .login-err{color:var(--red);font-size:0.82rem;text-align:center;margin-top:10px;min-height:20px;}
    .login-hint{color:#666;font-size:0.75rem;text-align:center;margin-top:14px;}

    /* ---- APP ---- */
    #app-screen{display:none;}
    .header{background:var(--black);color:var(--orange);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
    .header-title{font-size:1.2rem;font-weight:900;}
    .header-subtitle{font-size:0.68rem;color:var(--orange-deep);margin-top:1px;}
    .header-right{display:flex;gap:10px;align-items:center;}
    .icon-btn{background:none;border:none;color:var(--orange);font-size:1.3rem;cursor:pointer;padding:4px;}
    .nav{display:flex;background:var(--black);border-bottom:3px solid var(--orange);}
    .nav-btn{flex:1;padding:10px 4px;background:none;border:none;color:#888;font-family:inherit;font-size:0.72rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all 0.2s;}
    .nav-btn.active{color:var(--orange);border-bottom-color:var(--orange);}
    .nav-btn .nav-icon{font-size:1rem;display:block;margin-bottom:2px;}
    .page{display:none;padding:16px;}
    .page.active{display:block;}
    .card{background:var(--white);border:1.5px solid #e8dfc8;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
    .form-group{margin-bottom:14px;}
    .form-label{display:block;font-size:0.78rem;font-weight:700;color:var(--gray);margin-bottom:5px;}
    .form-input,.form-select{width:100%;padding:11px 14px;border:1.5px solid #ddd0b0;border-radius:8px;font-family:inherit;font-size:0.95rem;background:var(--gray-light);color:var(--black);transition:border-color 0.2s;appearance:none;}
    .form-input:focus,.form-select:focus{outline:none;border-color:var(--orange);background:var(--white);}
    .btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .btn-primary{background:var(--orange);color:var(--black);}
    .btn-primary:active{background:var(--orange-deep);transform:scale(0.98);}
    .btn-secondary{background:var(--gray-light);color:var(--black);border:1.5px solid #ddd0b0;}
    .btn-danger-full{background:var(--red);color:white;}
    .btn-green{background:var(--green);color:white;}
    .btn-sm-danger{background:var(--red);color:white;padding:8px 14px;width:auto;font-size:0.8rem;border-radius:7px;border:none;cursor:pointer;font-family:inherit;}
    .btn-sm-edit{background:var(--gray-light);color:var(--black);padding:8px 14px;width:auto;font-size:0.8rem;border-radius:7px;border:1.5px solid #ddd0b0;cursor:pointer;font-family:inherit;}
    .pay-toggle-label{display:block;font-size:0.78rem;font-weight:700;color:var(--gray);margin-bottom:5px;}
    .pay-toggle{display:flex;border-radius:8px;overflow:hidden;border:1.5px solid #ddd0b0;margin-bottom:14px;}
    .pay-btn{flex:1;padding:11px 8px;border:none;font-family:inherit;font-size:0.88rem;font-weight:700;cursor:pointer;background:var(--gray-light);color:var(--gray);}
    .pay-btn.paid{background:var(--green);color:white;}
    .pay-btn.unpaid{background:var(--red);color:white;}
    .pay-badge{display:inline-block;font-size:0.72rem;font-weight:700;padding:3px 9px;border-radius:20px;margin-left:6px;}
    .pay-badge.paid{background:#d4edda;color:var(--green);}
    .pay-badge.unpaid{background:#fde8e8;color:var(--red);}
    .trip-card{background:var(--white);border:1.5px solid #e8dfc8;border-left:5px solid var(--orange);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(245,166,35,0.08);}
    .trip-card.unpaid-card{border-left-color:var(--red);}
    .trip-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .trip-customer{font-weight:700;font-size:1rem;display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
    .trip-price{font-size:1.1rem;font-weight:900;color:var(--orange-deep);white-space:nowrap;}
    .trip-details{font-size:0.8rem;color:var(--gray);line-height:1.7;}
    .trip-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
    .empty-state{text-align:center;padding:40px 20px;color:var(--gray);}
    .empty-icon{font-size:3rem;margin-bottom:12px;}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
    .stat-card{background:var(--black);color:var(--orange);border-radius:12px;padding:14px;text-align:center;}
    .stat-value{font-size:1.5rem;font-weight:900;}
    .stat-label{font-size:0.68rem;color:var(--orange-deep);margin-top:4px;}
    .stat-card.green-card{background:var(--green);}
    .stat-card.red-card{background:var(--red);}
    .report-section-title{font-size:0.85rem;font-weight:700;color:var(--gray);margin:16px 0 8px;padding-bottom:4px;border-bottom:2px solid var(--orange-light);}
    .rank-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gray-light);border-radius:8px;margin-bottom:6px;font-size:0.85rem;}
    .rank-num{background:var(--orange);color:var(--black);font-weight:900;border-radius:50%;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;font-size:0.75rem;margin-left:8px;flex-shrink:0;}
    .rank-name{font-weight:600;flex:1;padding:0 8px;}
    .rank-val{font-weight:700;color:var(--orange-deep);white-space:nowrap;}
    .month-select-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;}
    .month-select-row .form-select{flex:1;}
    .month-label{font-size:0.8rem;font-weight:700;color:var(--gray);white-space:nowrap;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,18,8,0.75);z-index:200;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--white);border-radius:16px;padding:20px;width:92%;max-width:440px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.3);}
    .modal-title{font-size:1.1rem;font-weight:900;margin-bottom:16px;color:var(--orange-deep);}
    .modal-actions{display:flex;gap:10px;margin-top:16px;}
    .btn-cancel{flex:1;padding:12px;border:1.5px solid #ddd0b0;border-radius:10px;font-family:inherit;font-weight:700;background:var(--gray-light);cursor:pointer;font-size:0.9rem;}
    .btn-save{flex:1;padding:12px;background:var(--orange);border:none;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer;font-size:0.9rem;}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--black);color:var(--orange);padding:12px 24px;border-radius:24px;font-size:0.85rem;font-weight:700;z-index:999;transition:transform 0.3s ease;white-space:nowrap;pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0);}
    .install-banner{background:var(--orange);color:var(--black);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;font-size:0.82rem;font-weight:700;gap:10px;}
    .install-banner button{background:var(--black);color:var(--orange);border:none;border-radius:6px;padding:6px 12px;font-family:inherit;font-weight:700;cursor:pointer;font-size:0.82rem;}
    .install-banner .close-banner{background:none;color:var(--black);padding:4px;font-size:1rem;}
    .search-input{width:100%;padding:10px 14px;border:1.5px solid #ddd0b0;border-radius:8px;font-family:inherit;font-size:0.9rem;background:var(--gray-light);color:var(--black);margin-bottom:12px;}
    .search-input:focus{outline:none;border-color:var(--orange);}
    .filter-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
    .filter-row .form-select{flex:1;min-width:90px;padding:8px 10px;font-size:0.82rem;}
    .filter-label{font-size:0.75rem;color:var(--gray);font-weight:700;}
    .section-title{font-size:0.9rem;font-weight:900;color:var(--black);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .count-badge{background:var(--orange);color:var(--black);border-radius:20px;padding:2px 10px;font-size:0.75rem;font-weight:900;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .tg-status{font-size:0.72rem;color:var(--gray);margin-top:8px;text-align:center;min-height:18px;}
    .tg-status.ok{color:var(--green);}
    .tg-status.err{color:var(--red);}
    .divider{border:none;border-top:1.5px solid #e8dfc8;margin:16px 0;}
    .settings-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #e8dfc8;}
    .settings-label{font-size:0.9rem;font-weight:700;}
    .settings-sub{font-size:0.75rem;color:var(--gray);margin-top:2px;}
    .user-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gray-light);border-radius:8px;margin-bottom:8px;}
    .user-info{font-size:0.88rem;font-weight:600;}
    .user-phone{font-size:0.75rem;color:var(--gray);}
    /* import area */
    .import-box{border:2px dashed #ddd0b0;border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px;background:var(--gray-light);}
    .import-box:hover{border-color:var(--orange);background:var(--orange-light);}
    .import-box-icon{font-size:2rem;margin-bottom:6px;}
    .import-box-text{font-size:0.85rem;color:var(--gray);}
    .section-sep{font-size:0.78rem;font-weight:700;color:var(--gray);margin:16px 0 10px;padding-bottom:4px;border-bottom:2px solid var(--orange-light);}
  </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-logo">🛺</div>
  <div class="login-title">ባጃጅ ትራከር</div>
  <div class="login-sub">የጉዞ መዝገብ ስርዓት</div>
  <div class="login-card">
    <label class="login-label">📱 ስልክ ቁጥር</label>
    <input class="login-input" id="l-phone" type="tel" placeholder="09XXXXXXXX" />
    <label class="login-label">🔑 PIN</label>
    <input class="login-input" id="l-pin" type="password" placeholder="••••" maxlength="6" />
    <button class="login-btn" onclick="doLogin()">ግባ →</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-hint">👆 አስተዳዳሪ ብቻ ሊገባ ይችላል</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app-screen">
  <div class="install-banner" id="installBanner" style="display:none">
    <span>📲 Install አድርጉ</span>
    <button onclick="doInstall()">Install</button>
    <button class="close-banner" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
  </div>

  <div class="header">
    <div>
      <div class="header-title">🛺 ባጃጅ ትራከር</div>
      <div class="header-subtitle" id="header-user">—</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" title="ውጣ" onclick="doLogout()">🚪</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showPage('add')"><span class="nav-icon">➕</span>ጨምር</button>
    <button class="nav-btn" onclick="showPage('list')"><span class="nav-icon">📋</span>ጉዞዎች</button>
    <button class="nav-btn" onclick="showPage('report')"><span class="nav-icon">📊</span>ሪፖርት</button>
    <button class="nav-btn" onclick="showPage('settings')"><span class="nav-icon">⚙️</span>ቅንብር</button>
  </div>

  <!-- ADD -->
  <div class="page active" id="page-add">
    <div class="card">
      <div class="form-group"><label class="form-label">👤 የደንበኛ ስም</label><input class="form-input" id="f-customer" type="text" placeholder="ለምሳሌ፡ አበበ"/></div>
      <div class="form-group"><label class="form-label">📍 የደረሰበት ቦታ</label><input class="form-input" id="f-place" type="text" placeholder="ለምሳሌ፡ ሜክሲኮ፣ ቦሌ..."/></div>
      <div class="form-group"><label class="form-label">💰 ክፍያ (ብር)</label><input class="form-input" id="f-price" type="number" placeholder="0" min="0"/></div>
      <div class="form-group"><label class="form-label">📦 ጭነት / መጠን</label><input class="form-input" id="f-cargo" type="text" placeholder="ለምሳሌ፡ 2 ሳጥን..."/></div>
      <div class="grid2">
        <div class="form-group"><label class="form-label">📅 ቀን</label><input class="form-input" id="f-date" type="date"/></div>
        <div class="form-group"><label class="form-label">🕐 ሰዓት</label><input class="form-input" id="f-time" type="time"/></div>
      </div>
      <span class="pay-toggle-label">💳 የክፍያ ሁኔታ</span>
      <div class="pay-toggle">
        <button class="pay-btn paid" id="add-paid-btn" onclick="setAddPay('paid')">✅ ከፍሏል</button>
        <button class="pay-btn" id="add-unpaid-btn" onclick="setAddPay('unpaid')">❌ አልከፈለም</button>
      </div>
      <input type="hidden" id="f-payment" value="paid"/>
      <button class="btn btn-primary" onclick="addTrip()">✅ ጉዞ ተመዝግቧል</button>
      <div class="tg-status" id="tg-add-status"></div>
    </div>
  </div>

  <!-- LIST -->
  <div class="page" id="page-list">
    <input class="search-input" id="search-input" type="text" placeholder="🔍 ደንበኛ ወይም ቦታ ፈልግ..." oninput="renderList()"/>
    <div class="filter-row">
      <span class="filter-label">ወር:</span>
      <select class="form-select" id="filter-month" onchange="renderList()"><option value="">ሁሉም</option></select>
      <select class="form-select" id="filter-pay" onchange="renderList()">
        <option value="">ሁሉም ክፍያ</option>
        <option value="paid">✅ ከፍሏል</option>
        <option value="unpaid">❌ አልከፈለም</option>
      </select>
    </div>
    <div class="section-title">ጉዞዎች <span class="count-badge" id="trip-count">0</span></div>
    <div id="trip-list"></div>
  </div>

  <!-- REPORT -->
  <div class="page" id="page-report">
    <div class="month-select-row">
      <span class="month-label">ወር ምረጥ:</span>
      <select class="form-select" id="report-month" onchange="renderReport()"><option value="">ሁሉም ጊዜ</option></select>
    </div>
    <div id="report-content"></div>
  </div>

  <!-- SETTINGS -->
  <div class="page" id="page-settings">
    <!-- Import from Telegram -->
    <div class="section-sep">📥 ከ Telegram ፋይል አምጣ</div>
    <div class="card">
      <div class="import-box" onclick="document.getElementById('import-file').click()">
        <div class="import-box-icon">📂</div>
        <div class="import-box-text">JSON ፋይል ምረጥ<br><small>(bajaj_backup_…json)</small></div>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)"/>
      <div class="tg-status" id="import-status"></div>
    </div>

    <!-- Admins -->
    <div class="section-sep">👥 አስተዳዳሪዎች</div>
    <div class="card">
      <div id="admin-list"></div>
      <button class="btn btn-primary" style="margin-top:8px" onclick="openAddAdmin()">➕ አስተዳዳሪ ጨምር</button>
    </div>

    <!-- Change own PIN -->
    <div class="section-sep">🔑 የኔ PIN ቀይር</div>
    <div class="card">
      <div class="form-group"><label class="form-label">አሁን ያለ PIN</label><input class="form-input" id="s-old-pin" type="password" placeholder="••••" maxlength="6"/></div>
      <div class="form-group"><label class="form-label">አዲስ PIN</label><input class="form-input" id="s-new-pin" type="password" placeholder="••••" maxlength="6"/></div>
      <div class="form-group"><label class="form-label">አዲስ PIN ደግም</label><input class="form-input" id="s-new-pin2" type="password" placeholder="••••" maxlength="6"/></div>
      <button class="btn btn-primary" onclick="changePin()">🔑 PIN ቀይር</button>
      <div class="tg-status" id="pin-status"></div>
    </div>

    <!-- Logout -->
    <div class="section-sep"></div>
    <button class="btn btn-danger-full" onclick="doLogout()" style="margin-bottom:32px">🚪 ውጣ</button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">✏️ ጉዞ አስተካክል</div>
    <input type="hidden" id="edit-id"/>
    <div class="form-group"><label class="form-label">👤 ደንበኛ ስም</label><input class="form-input" id="e-customer" type="text"/></div>
    <div class="form-group"><label class="form-label">📍 ቦታ</label><input class="form-input" id="e-place" type="text"/></div>
    <div class="form-group"><label class="form-label">💰 ክፍያ (ብር)</label><input class="form-input" id="e-price" type="number" min="0"/></div>
    <div class="form-group"><label class="form-label">📦 ጭነት / መጠን</label><input class="form-input" id="e-cargo" type="text"/></div>
    <div class="grid2">
      <div class="form-group"><label class="form-label">📅 ቀን</label><input class="form-input" id="e-date" type="date"/></div>
      <div class="form-group"><label class="form-label">🕐 ሰዓት</label><input class="form-input" id="e-time" type="time"/></div>
    </div>
    <span class="pay-toggle-label">💳 የክፍያ ሁኔታ</span>
    <div class="pay-toggle">
      <button class="pay-btn" id="edit-paid-btn" onclick="setEditPay('paid')">✅ ከፍሏል</button>
      <button class="pay-btn" id="edit-unpaid-btn" onclick="setEditPay('unpaid')">❌ አልከፈለም</button>
    </div>

<script>

  // ---- STORAGE HELPERS ----
  function getAdmins(){ return JSON.parse(localStorage.getItem('bajaj_admins')||'[]'); }

  function hashPin(pin){ return btoa(pin+'_bajaj_salt_2026'); } // simple obfuscation

  let trips = getTrips();
  let currentUser = null;
  let deferredPrompt = null;

  // ---- FIRST SETUP: seed default admin if none ----
  function ensureDefaultAdmin(){
    const admins = getAdmins();
    if(admins.length===0){
      // default: phone=0985460703 pin=1234  (user can change)
      saveAdmins([{phone:'0985460703', pin:hashPin('1234'), name:'አስተዳዳሪ'}]);

  ensureDefaultAdmin();

  // ---- LOGIN ----
  function doLogin(){
    const phone = document.getElementById('l-phone').value.trim();
    const pin   = document.getElementById('l-pin').value.trim();
    const err   = document.getElementById('login-err');
    if(!phone||!pin){ err.textContent='❗ ስልክ ቁጥር እና PIN ያስፈልጋሉ'; return; }

    if(!found){ err.textContent='❌ ስልክ ቁጥር ወይም PIN ትክክል አይደለም'; return; }

  document.getElementById('l-pin').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

  function doLogout(){
    currentUser=null;

  // ---- ADMIN MANAGEMENT ----
  function renderAdminList(){
    const admins=getAdmins();
    document.getElementById('admin-list').innerHTML = admins.map((a,i)=>`
      <div class="user-row">
        <div><div class="user-info">${a.name||'አስተዳዳሪ'}</div><div class="user-phone">${a.phone}</div></div>
        ${admins.length>1?`<button class="btn-sm-danger" onclick="removeAdmin(${i})">🗑️</button>`:'<span style="font-size:0.7rem;color:#aaa">ዋና</span>'}
      </div>`).join('');
  }
  function openAddAdmin(){ document.getElementById('a-phone').value=''; document.getElementById('a-pin').value=''; document.getElementById('admin-status').textContent=''; document.getElementById('admin-modal').classList.add('open'); }
  function saveAdmin(){
    const phone=document.getElementById('a-phone').value.trim();
    const pin=document.getElementById('a-pin').value.trim();
    const st=document.getElementById('admin-status');
    if(!phone||!pin){ st.textContent='❗ ሁሉም መሞላት አለበት'; st.className='tg-status err'; return; }
    if(pin.length<4){ st.textContent='❗ PIN ቢያንስ 4 ዲጂት'; st.className='tg-status err'; return; }
    const admins=getAdmins();
    if(admins.find(a=>a.phone===phone)){ st.textContent='❗ ስልኩ ቀደም ብሎ አለ'; st.className='tg-status err'; return; }
    admins.push({phone, pin:hashPin(pin), name:'አስተዳዳሪ'});
    saveAdmins(admins); renderAdminList(); closeModal('admin-modal'); showToast('✅ አስተዳዳሪ ተጨምሯል');
  }
  function removeAdmin(i){
    if(!confirm('ይህን አስተዳዳሪ ለማስወገድ?')) return;
    const admins=getAdmins(); admins.splice(i,1); saveAdmins(admins); renderAdminList(); showToast('🗑️ ተሰርዟል');
  }

  // ---- CHANGE PIN ----
  function changePin(){
    const oldPin=document.getElementById('s-old-pin').value.trim();
    const newPin=document.getElementById('s-new-pin').value.trim();
    const newPin2=document.getElementById('s-new-pin2').value.trim();
    const st=document.getElementById('pin-status');
    if(!oldPin||!newPin||!newPin2){ st.textContent='❗ ሁሉም መሞላት አለበት'; st.className='tg-status err'; return; }
    if(newPin.length<4){ st.textContent='❗ PIN ቢያንስ 4 ዲጂት'; st.className='tg-status err'; return; }
    if(newPin!==newPin2){ st.textContent='❗ አዲስ PIN አይስማማም'; st.className='tg-status err'; return; }
    const admins=getAdmins();
    const idx=admins.findIndex(a=>a.phone===currentUser.phone && a.pin===hashPin(oldPin));
    if(idx===-1){ st.textContent='❌ አሁን ያለ PIN ትክክል አይደለም'; st.className='tg-status err'; return; }
    admins[idx].pin=hashPin(newPin);
    saveAdmins(admins); currentUser=admins[idx];
    document.getElementById('s-old-pin').value='';
    document.getElementById('s-new-pin').value='';
    document.getElementById('s-new-pin2').value='';
    st.textContent='✅ PIN ተቀይሯል!'; st.className='tg-status ok';
    setTimeout(()=>{ st.textContent=''; },3000);

  // ---- IMPORT JSON ----
  function importJSON(event){
    const file=event.target.files[0]; if(!file) return;
    const st=document.getElementById('import-status');
    st.textContent='📂 እየተነበበ...'; st.className='tg-status';
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        const imported = Array.isArray(data) ? data : (data.trips||[]);
        if(!imported.length){ st.textContent='⚠️ ጉዞ አልተገኘም'; st.className='tg-status err'; return; }
        // merge: skip duplicates by id
        const existing=new Set(trips.map(t=>t.id));
        let added=0;
        imported.forEach(t=>{ if(!existing.has(t.id)){ trips.unshift(t); added++; } });
        saveTrips(trips); populateMonthSelects(); renderList(); renderReport();
        st.textContent=`✅ ${added} ጉዞ ተጨምሯል`; st.className='tg-status ok';
        showToast(`✅ ${added} ጉዞ ተጨምሯል`);
      } catch(err){
        st.textContent='❌ ፋይሉ ትክክል አይደለም'; st.className='tg-status err';
      }
      event.target.value='';
      setTimeout(()=>{ st.textContent=''; },4000);
    };
    reader.readAsText(file);
  }

  // ---- TELEGRAM BACKUP ----
  async function sendToTelegram(statusElId){
    const st=document.getElementById(statusElId);
    if(st){ st.textContent='📤 Telegram ወደ bot እየተላከ...'; st.className='tg-status'; }
    try{
      const now=new Date();
      const ds=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
      const phone=currentUser?currentUser.phone:'unknown';
      const fname=`bajaj_backup_${phone}_${ds}.json`;
      const backupData={app:'ባጃጅ ትራከር',exported:now.toLocaleString('en-GB'),phone,total_trips:trips.length,trips};
      const fd=new FormData();
      fd.append('chat_id',TG_CHAT);
      fd.append('document',new Blob([JSON.stringify(backupData,null,2)],{type:'application/json'}),fname);
      fd.append('caption',`🛺 ባጃጅ ትራከር backup\n📅 ${now.toLocaleString('en-GB')}\n👤 ${phone}\n📊 ጠቅላላ ጉዞ: ${trips.length}`);
      const r=await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendDocument`,{method:'POST',body:fd});
      const res=await r.json();
      if(res.ok){ if(st){ st.textContent='✅ Telegram bot ደረሰ!'; st.className='tg-status ok'; } }
      else{ if(st){ st.textContent='⚠️ '+res.description; st.className='tg-status err'; } }
    }catch(e){ if(st){ st.textContent='❌ ኔትወርክ ስህተት'; st.className='tg-status err'; } }
    setTimeout(()=>{ if(st) st.textContent=''; },4000);
  }

  // ---- ADD TRIP ----
  function addTrip(){
    const customer=document.getElementById('f-customer').value.trim();
    const place=document.getElementById('f-place').value.trim();
    const price=parseFloat(document.getElementById('f-price').value)||0;
    const cargo=document.getElementById('f-cargo').value.trim();
    const date=document.getElementById('f-date').value;
    const time=document.getElementById('f-time').value;
    const payment=document.getElementById('f-payment').value;
    if(!customer||!place){ showToast('❗ ደንበኛ ስም እና ቦታ ያስፈልጋሉ'); return; }
    trips.unshift({id:Date.now().toString(36)+Math.random().toString(36).slice(2),customer,place,price,cargo,date,time,payment});
    saveTrips(trips); populateMonthSelects(); showToast('✅ ጉዞ ተመዝግቧል!');
    document.getElementById('f-customer').value='';
    document.getElementById('f-place').value='';
    document.getElementById('f-price').value='';
    document.getElementById('f-cargo').value='';
    const now=new Date();
    document.getElementById('f-date').value=now.toISOString().slice(0,10);
    document.getElementById('f-time').value=now.toTimeString().slice(0,5);
    setAddPay('paid');
    sendToTelegram('tg-add-status');
  }

  // ---- PAY TOGGLE ----
  function setAddPay(v){
    document.getElementById('f-payment').value=v;
    document.getElementById('add-paid-btn').className='pay-btn'+(v==='paid'?' paid':'');
    document.getElementById('add-unpaid-btn').className='pay-btn'+(v==='unpaid'?' unpaid':'');
  }
  function setEditPay(v){
    document.getElementById('e-payment').value=v;
    document.getElementById('edit-paid-btn').className='pay-btn'+(v==='paid'?' paid':'');
    document.getElementById('edit-unpaid-btn').className='pay-btn'+(v==='unpaid'?' unpaid':'');
  }
  setAddPay('paid');

  // ---- MONTHS ----
  function getMonths(){ const m=new Set(); trips.forEach(t=>{if(t.date)m.add(t.date.slice(0,7));}); return [...m].sort().reverse(); }
  function monthLabel(ym){ if(!ym)return''; const[y,m]=ym.split('-'); return['ጃንዋሪ','ፌብሩዋሪ','ማርች','ኤፕሪል','ሜይ','ጁን','ጁላይ','ኦገስት','ሴፕቴምበር','ኦክቶበር','ኖቬምበር','ዲሴምበር'][parseInt(m)-1]+' '+y; }
  function populateMonthSelects(){
    const months=getMonths();
    ['filter-month','report-month'].forEach(id=>{
      const el=document.getElementById(id),cur=el.value;
      el.innerHTML='<option value="">ሁሉም ጊዜ</option>';
      months.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=monthLabel(m);el.appendChild(o);});
      el.value=cur;
    });
  }

  // ---- LIST ----
  function renderList(){
    const q=document.getElementById('search-input').value.trim().toLowerCase();
    const month=document.getElementById('filter-month').value;
    const pay=document.getElementById('filter-pay').value;
    const filtered=trips.filter(t=>{
      return (!q||t.customer.toLowerCase().includes(q)||t.place.toLowerCase().includes(q))
          &&(!month||(t.date&&t.date.startsWith(month)))
          &&(!pay||(t.payment||'paid')===pay);
    });
    document.getElementById('trip-count').textContent=filtered.length;
    const c=document.getElementById('trip-list');
    if(!filtered.length){ c.innerHTML='<div class="empty-state"><div class="empty-icon">🛺</div><div>ምንም ጉዞ አልተመዘገበም</div></div>'; return; }
    c.innerHTML=filtered.map(t=>{
      const ip=(t.payment||'paid')==='paid';
      return `<div class="trip-card ${ip?'':'unpaid-card'}">
        <div class="trip-top">
          <div class="trip-customer">👤 ${t.customer}<span class="pay-badge ${ip?'paid':'unpaid'}">${ip?'✅ ከፍሏል':'❌ አልከፈለም'}</span></div>
          <div class="trip-price">💰 ${t.price.toLocaleString()} ብር</div>
        </div>
        <div class="trip-details">📍 ${t.place}<br>📦 ${t.cargo||'—'}<br>📅 ${t.date||'—'} ${t.time?'· '+t.time:''}</div>
        <div class="trip-actions">
          <button class="btn-sm-edit" onclick="openEdit('${t.id}')">✏️ አስተካክል</button>
          <button class="btn-sm-danger" onclick="deleteTrip('${t.id}')">🗑️ ሰርዝ</button>
        </div>
      </div>`;
    }).join('');
  }

  // ---- DELETE ----
  function deleteTrip(id){
    if(!confirm('ይህን ጉዞ ለመሰረዝ?')) return;
    trips=trips.filter(t=>t.id!==id);
    saveTrips(trips); populateMonthSelects(); renderList(); renderReport(); showToast('🗑️ ጉዞ ተሰርዟል');
  }

  // ---- EDIT ----
  function openEdit(id){
    const t=trips.find(x=>x.id===id); if(!t) return;
    document.getElementById('edit-id').value=id;
    document.getElementById('e-customer').value=t.customer;
    document.getElementById('e-place').value=t.place;
    document.getElementById('e-price').value=t.price;
    document.getElementById('e-cargo').value=t.cargo||'';
    document.getElementById('e-date').value=t.date||'';
    document.getElementById('e-time').value=t.time||'';
    setEditPay(t.payment||'paid');
    document.getElementById('edit-modal').classList.add('open');
  }
  function saveEdit(){
    const id=document.getElementById('edit-id').value;
    const idx=trips.findIndex(x=>x.id===id); if(idx===-1) return;
    trips[idx]={...trips[idx],
      customer:document.getElementById('e-customer').value.trim(),
      place:document.getElementById('e-place').value.trim(),
      price:parseFloat(document.getElementById('e-price').value)||0,
      cargo:document.getElementById('e-cargo').value.trim(),
      date:document.getElementById('e-date').value,
      time:document.getElementById('e-time').value,
      payment:document.getElementById('e-payment').value,
    };
    saveTrips(trips); renderList(); renderReport(); showToast('✅ ጉዞ ተስተካክሏል');
    sendToTelegram('tg-edit-status');
    setTimeout(()=>closeModal('edit-modal'),3500);
  }

  // ---- REPORT ----
  function renderReport(){
    const month=document.getElementById('report-month').value;
    const data=trips.filter(t=>!month||(t.date&&t.date.startsWith(month)));
    const total=data.length,revenue=data.reduce((s,t)=>s+(t.price||0),0);
    const paidD=data.filter(t=>(t.payment||'paid')==='paid');
    const unpaidD=data.filter(t=>(t.payment||'paid')==='unpaid');
    const placeMap={},custMap={};
    data.forEach(t=>{
      if(!placeMap[t.place])placeMap[t.place]={count:0,amount:0};
      placeMap[t.place].count++;placeMap[t.place].amount+=t.price||0;
      if(!custMap[t.customer])custMap[t.customer]={count:0,amount:0};
      custMap[t.customer].count++;custMap[t.customer].amount+=t.price||0;
    });
    const row=arr=>arr.length===0?'<div class="empty-state" style="padding:16px"><div>ምንም ጉዞ የለም</div></div>'
      :Object.entries(arr).sort((a,b)=>b[1].amount-a[1].amount).map(([n,v],i)=>`<div class="rank-row"><span class="rank-num">${i+1}</span><span class="rank-name">${n}</span><span style="font-size:0.75rem;color:#888;margin-right:8px">${v.count} ጉዞ</span><span class="rank-val">${v.amount.toLocaleString()} ብር</span></div>`).join('');
    document.getElementById('report-content').innerHTML=`
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">ጠቅላላ ጉዞ</div></div>
        <div class="stat-card"><div class="stat-value">${revenue.toLocaleString()}</div><div class="stat-label">ጠቅላላ ገቢ (ብር)</div></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card green-card"><div class="stat-value">${paidD.length}</div><div class="stat-label">✅ ከፍሏል · ${paidD.reduce((s,t)=>s+(t.price||0),0).toLocaleString()} ብር</div></div>
        <div class="stat-card red-card"><div class="stat-value">${unpaidD.length}</div><div class="stat-label">❌ አልከፈለም · ${unpaidD.reduce((s,t)=>s+(t.price||0),0).toLocaleString()} ብር</div></div>
      </div>
      <div class="report-section-title">📍 በቦታ የተደረደረ</div>${row(placeMap)}
      <div class="report-section-title">👤 በደንበኛ የተደረደረ</div>${row(custMap)}`;
  }

  // ---- NAV ----
  function showPage(name){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('page-'+name).classList.add('active');
    ['add','list','report','settings'].forEach((p,i)=>{ if(p===name) document.querySelectorAll('.nav-btn')[i].classList.add('active'); });
    if(name==='list') renderList();
    if(name==='report'){populateMonthSelects();renderReport();}
    if(name==='settings') renderAdminList();
  }

  // ---- MODAL ----
  function closeModal(id){ document.getElementById(id).classList.remove('open'); }
  document.getElementById('edit-modal').addEventListener('click',function(e){if(e.target===this)closeModal('edit-modal');});
  document.getElementById('admin-modal').addEventListener('click',function(e){if(e.target===this)closeModal('admin-modal');});

  // ---- TOAST ----
  function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

  // ---- PWA ----
  window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; document.getElementById('installBanner').style.display='flex'; });
  function doInstall(){ if(!deferredPrompt)return; deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; document.getElementById('installBanner').style.display='none'; }); }

  // ---- INIT ----
  window.addEventListener('DOMContentLoaded',()=>{
    const now=new Date();
    document.getElementById('f-date').value=now.toISOString().slice(0,10);
    document.getElementById('f-time').value=now.toTimeString().slice(0,5);
  });
</script>
</body>
</html>
